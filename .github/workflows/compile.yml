name: Compile Android APK
on:
  repository_dispatch:
    types: [compile_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: false

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bootstrap Android Project
        run: |2
          # 1. Generate Gradle wrapper files (done first to avoid Gradle 9.x evaluation errors on incompatible AGP version)
          gradle wrapper --gradle-version 8.0

          # 2. Create root settings.gradle.kts if missing
          if [ ! -f settings.gradle.kts ]; then
            cat << 'EOF' > settings.gradle.kts
            pluginManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            dependencyResolutionManagement {
                repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
                repositories {
                    google()
                    mavenCentral()
                }
            }
            rootProject.name = "GeneratedApp"
            include(":app")
          EOF
          fi

          # 3. Create root build.gradle.kts if missing
          if [ ! -f build.gradle.kts ]; then
            cat << 'EOF' > build.gradle.kts
            plugins {
                id("com.android.application") version "8.1.1" apply false
                id("org.jetbrains.kotlin.android") version "1.8.10" apply false
            }
          EOF
          fi

          # 4. Create app/build.gradle.kts if missing
          if [ ! -f app/build.gradle.kts ]; then
            mkdir -p app
            cat << 'EOF' > app/build.gradle.kts
            plugins {
                id("com.android.application")
                id("org.jetbrains.kotlin.android")
            }

            android {
                namespace = "com.generated.app"
                compileSdk = 33

                defaultConfig {
                    applicationId = "com.generated.app"
                    minSdk = 24
                    targetSdk = 33
                    versionCode = 1
                    versionName = "1.0"
                    testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
                    vectorDrawables {
                        useSupportLibrary = true
                    }
                }

                buildTypes {
                    release {
                        isMinifyEnabled = false
                        proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                    }
                }
                compileOptions {
                    sourceCompatibility = JavaVersion.VERSION_17
                    targetCompatibility = JavaVersion.VERSION_17
                }
                kotlinOptions {
                    jvmTarget = "17"
                }
                buildFeatures {
                    compose = true
                }
                composeOptions {
                    kotlinCompilerExtensionVersion = "1.4.3"
                }
                packaging {
                    resources {
                        excludes += "/META-INF/{AL2.0,LGPL2.1}"
                    }
                }
            }

            dependencies {
                implementation("androidx.core:core-ktx:1.9.0")
                implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.1")
                implementation("androidx.activity:activity-compose:1.7.2")
                implementation(platform("androidx.compose:compose-bom:2023.03.00"))
                implementation("androidx.compose.ui:ui")
                implementation("androidx.compose.ui:ui-graphics")
                implementation("androidx.compose.ui:ui-tooling-preview")
                implementation("androidx.compose.material3:material3")
            }
          EOF
          fi

          # 5. Generate Keystore if missing
          if [ ! -f app/keystore.jks ]; then
            keytool -genkeypair -v \
              -keystore app/keystore.jks \
              -alias alias_name \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass testpass123 \
              -keypass testpass123 \
              -dname "CN=Generated, OU=Agent, O=AntiGravity, O=Termux, S=Android, C=US"
          fi

      - name: Build APK via Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          $(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)/apksigner sign \
            --ks app/keystore.jks \
            --ks-pass pass:testpass123 \
            --key-pass pass:testpass123 \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.event.client_payload.buildId }}
          files: app/build/outputs/apk/release/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
