name: Compile Android APK
on:
  repository_dispatch:
    types: [compile_apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Accept Android SDK Licenses
        run: |
          SDK_PATH=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          if [ -d "$SDK_PATH" ]; then
            echo "Using Android SDK at $SDK_PATH"
            sudo mkdir -p "$SDK_PATH/licenses"
            sudo chmod -R 777 "$SDK_PATH/licenses"
            echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01601800dd21a0d4055545\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e8057d85ab270295158a5cd\nf4f90f7e9d4e6ddbc197815d3824b995444a70a4\n37b7b1b04e44c2ca5b9024f2b1d6e32bc004d749\n39b390a82b083b0f5de888db0b7987e9c5d799f9\n84f22c1ec485d471550c609594191fe7c1ff44eb\n601085b86cd22f859b545d1d61591e1d90cbd42c\n" | sudo tee "$SDK_PATH/licenses/android-sdk-license" > /dev/null
            echo -e "\n84831b9409646a918e8057d85ab270295158a5cd\n" | sudo tee "$SDK_PATH/licenses/android-sdk-preview-license" > /dev/null
            if [ -f "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" ]; then
              yes | sudo "$SDK_PATH/cmdline-tools/latest/bin/sdkmanager" --licenses || true
            elif [ -f "$SDK_PATH/tools/bin/sdkmanager" ]; then
              yes | sudo "$SDK_PATH/tools/bin/sdkmanager" --licenses || true
            fi
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bootstrap Android Project
        run: |2
          # 1. Create a minimal settings.gradle.kts if it doesn't exist so gradle wrapper works without errors
          if [ ! -f settings.gradle.kts ]; then
            echo 'rootProject.name = "Temp"' > settings.gradle.kts
            TEMP_SETTINGS_CREATED=true
          else
            TEMP_SETTINGS_CREATED=false
          fi

          # 2. Generate Gradle wrapper files
          gradle wrapper --gradle-version 8.7

          # 3. Overwrite with real settings.gradle.kts if we created a temporary one
          if [ "$TEMP_SETTINGS_CREATED" = "true" ]; then
            cat << 'EOF' > settings.gradle.kts
            pluginManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            dependencyResolutionManagement {
                repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
                repositories {
                    google()
                    mavenCentral()
                }
            }
            rootProject.name = "GeneratedApp"
            include(":app")
          EOF
          fi

          # 4. Create root build.gradle.kts if missing
          if [ ! -f build.gradle.kts ]; then
            cat << 'EOF' > build.gradle.kts
            plugins {
                id("com.android.application") version "8.5.2" apply false
                id("org.jetbrains.kotlin.android") version "2.0.21" apply false
                id("org.jetbrains.kotlin.plugin.compose") version "2.0.21" apply false
                id("org.jetbrains.kotlin.plugin.serialization") version "2.0.21" apply false
            }
          EOF
          fi

          # 5. Create gradle.properties if missing to enable AndroidX and increase JVM heap
          if [ ! -f gradle.properties ]; then
            cat << 'EOF' > gradle.properties
            android.useAndroidX=true
            android.enableJetifier=true
            org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          EOF
          else
            # Ensure org.gradle.jvmargs is set to prevent OutOfMemoryErrors
            if ! grep -q "org.gradle.jvmargs" gradle.properties; then
              echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
            fi
          fi

          # 5b. Create default fallback resource files if they are missing (to prevent Android resource linking errors)
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap

          if [ ! -f app/src/main/res/values/strings.xml ]; then
            cat << 'EOF' > app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Alright Now Give</string>
          </resources>
          EOF
          fi

          if [ ! -f app/src/main/res/values/themes.xml ]; then
            cat << 'EOF' > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="android:Theme.Material.Light.NoActionBar" />
          </resources>
          EOF
          fi

          if [ ! -f app/src/main/res/xml/data_extraction_rules.xml ]; then
            cat << 'EOF' > app/src/main/res/xml/data_extraction_rules.xml
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
                  <include domain="file" path="." />
              </cloud-backup>
              <device-transfer>
                  <include domain="file" path="." />
              </device-transfer>
          </data-extraction-rules>
          EOF
          fi

          if [ ! -f app/src/main/res/xml/backup_rules.xml ]; then
            cat << 'EOF' > app/src/main/res/xml/backup_rules.xml
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <include domain="file" path="." />
          </full-backup-content>
          EOF
          fi

          if [ ! -f app/src/main/res/mipmap/ic_launcher.xml ]; then
            cat << 'EOF' > app/src/main/res/mipmap/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#3DDC84"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF
          fi

          if [ ! -f app/src/main/res/mipmap/ic_launcher_round.xml ]; then
            cat << 'EOF' > app/src/main/res/mipmap/ic_launcher_round.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#3DDC84"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF
          fi

          # 5c. Create default Application class if it's missing and not already declared
          mkdir -p app/src/main/java/com/generated/app
          if ! grep -rn "class App" app/src/main/java/ >/dev/null 2>&1; then
            if [ ! -f app/src/main/java/com/generated/app/App.kt ]; then
              cat << 'EOF' > app/src/main/java/com/generated/app/App.kt
          package com.generated.app
          import android.app.Application
          class App : Application()
          EOF
            fi
          fi

          # 6. Create app/build.gradle.kts if missing
          if [ ! -f app/build.gradle.kts ]; then
            mkdir -p app
            cat << 'EOF' > app/build.gradle.kts
            plugins {
                id("com.android.application")
                id("org.jetbrains.kotlin.android")
                id("org.jetbrains.kotlin.plugin.compose")
                id("org.jetbrains.kotlin.plugin.serialization")
            }

            android {
                namespace = "com.generated.app"
                compileSdk = 35

                defaultConfig {
                    applicationId = "com.generated.app"
                    minSdk = 26
                    targetSdk = 35
                    versionCode = 1
                    versionName = "1.0"
                    testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
                    vectorDrawables {
                        useSupportLibrary = true
                    }
                }

                buildTypes {
                    release {
                        isMinifyEnabled = false
                        proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                    }
                }
                compileOptions {
                    sourceCompatibility = JavaVersion.VERSION_17
                    targetCompatibility = JavaVersion.VERSION_17
                }
                kotlinOptions {
                    jvmTarget = "17"
                }
                buildFeatures {
                    compose = true
                }
                packaging {
                    resources {
                        excludes += "/META-INF/{AL2.0,LGPL2.1}"
                    }
                }
            }

            dependencies {
                implementation("androidx.core:core-ktx:1.15.0")
                implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.7")
                implementation("androidx.lifecycle:lifecycle-runtime-compose:2.8.7")
                implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7")
                implementation("androidx.activity:activity-compose:1.9.3")
                implementation(platform("androidx.compose:compose-bom:2024.12.01"))
                implementation("androidx.compose.ui:ui")
                implementation("androidx.compose.ui:ui-graphics")
                implementation("androidx.compose.ui:ui-tooling-preview")
                implementation("androidx.compose.material3:material3")
                implementation("androidx.compose.material:material-icons-extended")
                implementation("io.coil-kt:coil-compose:2.7.0")
                implementation("androidx.navigation:navigation-compose:2.8.5")
            }
          EOF
          fi

          # 7. Generate Keystore if missing
          if [ ! -f app/keystore.jks ]; then
            keytool -genkeypair -v \
              -keystore app/keystore.jks \
              -alias alias_name \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass testpass123 \
              -keypass testpass123 \
              -dname "CN=Generated, OU=Agent, O=AntiGravity, O=Termux, S=Android, C=US"
          fi

      - name: Build APK via Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          $(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)/apksigner sign \
            --ks app/keystore.jks \
            --ks-pass pass:testpass123 \
            --key-pass pass:testpass123 \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.event.client_payload.buildId }}
          files: app/build/outputs/apk/release/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
