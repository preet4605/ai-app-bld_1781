name: Compile Android APK
on:
  repository_dispatch:
    types: [compile_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: false

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bootstrap Android Project
        run: |2
          # 1. Create a minimal settings.gradle.kts if it doesn't exist so gradle wrapper works without errors
          if [ ! -f settings.gradle.kts ]; then
            echo 'rootProject.name = "Temp"' > settings.gradle.kts
            TEMP_SETTINGS_CREATED=true
          else
            TEMP_SETTINGS_CREATED=false
          fi

          # 2. Generate Gradle wrapper files (done first to avoid Gradle 9.x evaluation errors on incompatible AGP version)
          gradle wrapper --gradle-version 8.0

          # 3. Overwrite with real settings.gradle.kts if we created a temporary one
          if [ "$TEMP_SETTINGS_CREATED" = "true" ]; then
            cat << 'EOF' > settings.gradle.kts
            pluginManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            dependencyResolutionManagement {
                repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
                repositories {
                    google()
                    mavenCentral()
                }
            }
            rootProject.name = "GeneratedApp"
            include(":app")
          EOF
          fi

          # 4. Create root build.gradle.kts if missing
          if [ ! -f build.gradle.kts ]; then
            cat << 'EOF' > build.gradle.kts
            plugins {
                id("com.android.application") version "8.1.1" apply false
                id("org.jetbrains.kotlin.android") version "1.8.10" apply false
            }
          EOF
          fi

          # 5. Create gradle.properties if missing to enable AndroidX
          if [ ! -f gradle.properties ]; then
            cat << 'EOF' > gradle.properties
            android.useAndroidX=true
            android.enableJetifier=true
          EOF
          fi

          # 5b. Create default fallback resource files if they are missing (to prevent Android resource linking errors)
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap

          if [ ! -f app/src/main/res/values/strings.xml ]; then
            cat << 'EOF' > app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Modern Gallery</string>
          </resources>
          EOF
          fi

          if [ ! -f app/src/main/res/values/themes.xml ]; then
            cat << 'EOF' > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="android:Theme.Material.Light.NoActionBar" />
          </resources>
          EOF
          fi

          if [ ! -f app/src/main/res/xml/data_extraction_rules.xml ]; then
            cat << 'EOF' > app/src/main/res/xml/data_extraction_rules.xml
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
                  <include domain="file" path="." />
              </cloud-backup>
              <device-transfer>
                  <include domain="file" path="." />
              </device-transfer>
          </data-extraction-rules>
          EOF
          fi

          if [ ! -f app/src/main/res/xml/backup_rules.xml ]; then
            cat << 'EOF' > app/src/main/res/xml/backup_rules.xml
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <include domain="file" path="." />
          </full-backup-content>
          EOF
          fi

          if [ ! -f app/src/main/res/mipmap/ic_launcher.xml ]; then
            cat << 'EOF' > app/src/main/res/mipmap/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#3DDC84"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF
          fi

          if [ ! -f app/src/main/res/mipmap/ic_launcher_round.xml ]; then
            cat << 'EOF' > app/src/main/res/mipmap/ic_launcher_round.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#3DDC84"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF
          fi

          # 5c. Create default Application class if it's missing and not already declared
          mkdir -p app/src/main/java/com/generated/app
          if ! grep -rn "class App" app/src/main/java/ >/dev/null 2>&1; then
            if [ ! -f app/src/main/java/com/generated/app/App.kt ]; then
              cat << 'EOF' > app/src/main/java/com/generated/app/App.kt
          package com.generated.app
          import android.app.Application
          class App : Application()
          EOF
            fi
          fi

          # 6. Create app/build.gradle.kts if missing
          if [ ! -f app/build.gradle.kts ]; then
            mkdir -p app
            cat << 'EOF' > app/build.gradle.kts
            plugins {
                id("com.android.application")
                id("org.jetbrains.kotlin.android")
            }

            android {
                namespace = "com.generated.app"
                compileSdk = 33

                defaultConfig {
                    applicationId = "com.generated.app"
                    minSdk = 24
                    targetSdk = 33
                    versionCode = 1
                    versionName = "1.0"
                    testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
                    vectorDrawables {
                        useSupportLibrary = true
                    }
                }

                buildTypes {
                    release {
                        isMinifyEnabled = false
                        proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                    }
                }
                compileOptions {
                    sourceCompatibility = JavaVersion.VERSION_17
                    targetCompatibility = JavaVersion.VERSION_17
                }
                kotlinOptions {
                    jvmTarget = "17"
                }
                buildFeatures {
                    compose = true
                }
                composeOptions {
                    kotlinCompilerExtensionVersion = "1.4.3"
                }
                packaging {
                    resources {
                        excludes += "/META-INF/{AL2.0,LGPL2.1}"
                    }
                }
            }

            dependencies {
                implementation("androidx.core:core-ktx:1.9.0")
                implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.1")
                implementation("androidx.activity:activity-compose:1.7.2")
                implementation(platform("androidx.compose:compose-bom:2023.03.00"))
                implementation("androidx.compose.ui:ui")
                implementation("androidx.compose.ui:ui-graphics")
                implementation("androidx.compose.ui:ui-tooling-preview")
                implementation("androidx.compose.material3:material3")
            }
          EOF
          fi

          # 7. Generate Keystore if missing
          if [ ! -f app/keystore.jks ]; then
            keytool -genkeypair -v \
              -keystore app/keystore.jks \
              -alias alias_name \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass testpass123 \
              -keypass testpass123 \
              -dname "CN=Generated, OU=Agent, O=AntiGravity, O=Termux, S=Android, C=US"
          fi

      - name: Build APK via Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          $(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)/apksigner sign \
            --ks app/keystore.jks \
            --ks-pass pass:testpass123 \
            --key-pass pass:testpass123 \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.event.client_payload.buildId }}
          files: app/build/outputs/apk/release/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
